name: Sentiment Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "2-59/5 * * * *"

permissions:
  contents: write

concurrency:
  group: alert-state
  cancel-in-progress: false

jobs:
  sentiment-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run sentiment check
        env:
          ALERTS_ENABLED: "true"
          SEND_CHANGE_ALERTS: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_CONSENSUS_WALLETS: "3"
          TRACK_HIP3: "true"
        run: python3 scripts/run_alert_check.py

      - name: Persist alert state
        run: |
          if git diff --quiet -- data/alerts.json; then
            echo "No alert state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json
          git commit -m "Update alert state"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
