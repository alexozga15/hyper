name: Telegram Commands

on:
  workflow_dispatch:
  repository_dispatch:
    types: [telegram_update]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: telegram-commands
  cancel-in-progress: false

jobs:
  telegram-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Process Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_CONSENSUS_WALLETS: "3"
        run: python3 scripts/process_telegram_commands.py

      - name: Persist Telegram bot state
        run: |
          if git diff --quiet -- data/telegram_bot_state.json; then
            echo "No Telegram bot state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/telegram_bot_state.json
          git commit -m "Update Telegram bot state"
          git push
