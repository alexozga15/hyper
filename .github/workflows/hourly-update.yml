name: 4-Hour Update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

concurrency:
  group: alert-state
  cancel-in-progress: false

jobs:
  hourly-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Send hourly update
        env:
          ALERTS_ENABLED: "true"
          SEND_HOURLY_UPDATE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINMARKETMAN_API_TOKEN: ${{ secrets.COINMARKETMAN_API_TOKEN }}
          COINMARKETMAN_API_TOKEN_BACKUP: ${{ secrets.COINMARKETMAN_API_TOKEN_BACKUP }}
          CMM_TREND_ENRICHMENT: "true"
          CMM_SIGNAL_MAX_TREND_COINS: "3"
          CMM_SIGNAL_CACHE_TTL_MINUTES: "120"
          MIN_CONSENSUS_WALLETS: "4"
          TRACK_HIP3: "true"
        run: python3 scripts/run_alert_check.py

      - name: Persist alert state
        run: |
          if git diff --quiet -- data/alerts.json; then
            echo "No alert state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json
          git commit -m "Update alert state"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
